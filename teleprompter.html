<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Teleprompter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --bg:#0a0d12; --panel:rgba(20,26,34,0.72); --border:rgba(255,255,255,0.08);
    --up:#eef2f7; --spoken:#3b4452; --current:#ffcc66; --sub:#7c8595; --accent:#ffcc66;
    --bandcol:rgba(255,204,102,0.35); --glow:rgba(255,204,102,0.35);
  }
  body.light{
    --bg:#f6f7f9; --panel:rgba(255,255,255,0.82); --border:rgba(0,0,0,0.1);
    --up:#1a1d23; --spoken:#c2c8d0; --current:#b26a00; --sub:#6b7382; --accent:#b26a00;
    --bandcol:rgba(178,106,0,0.4); --glow:rgba(178,106,0,0.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--up); overflow:hidden;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; height:100vh;
  }
  button{font-family:inherit}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:34px; padding:0 10px; border-radius:9px; cursor:pointer;
    background:rgba(127,127,127,0.10); color:var(--up);
    border:1px solid var(--border); font-size:13px; font-weight:600;
    white-space:nowrap; line-height:1;
  }
  .btn:hover{background:rgba(127,127,127,0.18)}
  .btn.icon{padding:0 9px}
  .btn.live{background:rgba(255,204,102,0.16); border-color:rgba(255,204,102,0.55); color:var(--current)}
  #bar{
    flex-shrink:0; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 12px; background:var(--panel); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  #notice{
    flex-shrink:0; display:none; align-items:center; gap:10px; padding:8px 14px;
    background:rgba(255,204,102,0.10); border-bottom:1px solid rgba(255,204,102,0.25);
    color:#ffe2a8; font-size:13px;
  }
  #stage{position:relative; flex:1; min-height:0}
  #scroll{position:relative; height:100%; overflow-y:auto}
  #scroll::-webkit-scrollbar{width:8px}
  #scroll::-webkit-scrollbar-thumb{background:rgba(127,127,127,0.25); border-radius:8px}
  #content{
    max-width:72%; margin:0 auto; padding:15% 8px 70vh;
    font-size:42px; line-height:1.5; font-weight:600; letter-spacing:.2px;
  }
  #content p{margin:0 0 .7em}
  .w{cursor:pointer; transition:color .18s ease}
  .w.up{color:var(--up)}
  .w.spoken{color:var(--spoken)}
  .w.current{color:var(--current); text-shadow:0 0 24px var(--glow)}
  .w:hover{color:var(--up); filter:brightness(1.2)}
  #band{position:absolute; top:15%; left:0; right:0; z-index:5; pointer-events:none;
    height:1px; background:linear-gradient(90deg,transparent,var(--bandcol),transparent)}
  #fade{position:absolute; top:0; left:0; right:0; height:14%; z-index:4; pointer-events:none;
    background:linear-gradient(var(--bg),rgba(10,13,18,0))}
  #caption{
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:none;
    max-width:80%; padding:6px 14px; border-radius:999px; background:var(--panel);
    border:1px solid var(--border); color:var(--sub); font-size:13px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; backdrop-filter:blur(6px);
  }
  #showbar{
    position:absolute; top:6px; left:50%; transform:translateX(-50%); z-index:30; display:none;
    height:26px; padding:0 14px; background:var(--panel);
  }
  #pop{
    position:absolute; top:46px; right:12px; z-index:40; width:252px; display:none;
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px;
    box-shadow:0 16px 48px rgba(0,0,0,0.5); backdrop-filter:blur(10px);
  }
  .ctl{display:flex; flex-direction:column; gap:7px; margin-bottom:14px}
  .ctl-l{font-size:12px; font-weight:600; color:var(--up); opacity:.8}
  .ctl-h{font-size:11px; color:var(--sub)}
  .sep{height:1px; background:var(--border); margin:14px 0}
  input[type=range]{-webkit-appearance:none; appearance:none; height:4px; border-radius:4px;
    background:rgba(127,127,127,0.3); outline:none; width:100%}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:var(--accent); cursor:pointer}
  input[type=range]::-moz-range-thumb{width:14px; height:14px; border:none; border-radius:50%;
    background:var(--accent); cursor:pointer}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .pulse{animation:pulse 1.3s ease-in-out infinite}
  #editor{
    position:absolute; inset:0; z-index:20; background:var(--bg);
    backdrop-filter:blur(4px); display:flex; flex-direction:column; padding:20px;
  }
  #editor h2{margin:0; font-size:18px; font-weight:700}
  #drop{
    flex:1; margin:12px 0 14px; position:relative; display:flex;
    border:1.5px dashed rgba(127,127,127,0.35); border-radius:14px;
    background:rgba(127,127,127,0.04); transition:all .15s ease;
  }
  #drop.drag{border-color:var(--accent); background:rgba(255,204,102,0.06)}
  #draft{
    flex:1; resize:none; border:none; outline:none; background:transparent; color:var(--up);
    font-size:17px; line-height:1.6; padding:18px; font-family:inherit;
  }
  #droplabel{position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    color:var(--accent); font-size:16px; font-weight:600; pointer-events:none}
  #drop.drag #droplabel{display:flex}
  #load{height:40px; padding:0 22px; border-radius:10px; border:none; cursor:pointer;
    background:var(--accent); color:#1a1206; font-weight:700; font-size:14px}
  #load:disabled{background:rgba(127,127,127,0.18); color:var(--sub); cursor:not-allowed}
  .sub{color:var(--sub); font-size:13px}
  .spacer{flex:1}
  svg{display:block}
</style>
</head>
<body>

<div id="bar">
  <button class="btn" id="scriptBtn">✏️ Script</button>
  <button class="btn" id="voiceBtn" style="display:none">🎙️ Start voice</button>
  <div style="display:flex; align-items:center; gap:4px">
    <button class="btn icon" id="fontMinus">A−</button>
    <button class="btn icon" id="fontPlus">A+</button>
  </div>
  <button class="btn" id="resetBtn">↺ Reset</button>
  <button class="btn icon" id="themeBtn" title="Light / dark">🌙</button>
  <button class="btn icon" id="gearBtn">⚙</button>
  <div class="spacer"></div>
  <span class="sub" id="pct" style="font-variant-numeric:tabular-nums">0%</span>
  <button class="btn icon" id="fsBtn" title="Full screen">⛶</button>
  <button class="btn icon" id="hideBtn" title="Hide bar">▲</button>
</div>

<button class="btn" id="showbar">▼ Controls</button>

<div id="notice"><span id="noticeText" style="flex:1"></span><span id="noticeX" style="cursor:pointer">✕</span></div>

<div id="pop">
  <div class="ctl">
    <div class="ctl-l" id="widthLbl">Column width — 72%</div>
    <input type="range" id="width" min="40" max="100" value="72" />
  </div>
  <div class="ctl">
    <div class="ctl-l" id="senseLbl">Match sensitivity — 7</div>
    <input type="range" id="sense" min="3" max="12" value="7" />
    <div class="ctl-h">Higher tolerates skipped or paraphrased words</div>
  </div>
  <div class="sep"></div>
  <div class="ctl">
    <div class="ctl-l">Auto-scroll (no mic)</div>
    <div style="display:flex; align-items:center; gap:8px">
      <button class="btn" id="autoBtn" style="padding:0 12px">▶ Play</button>
      <input type="range" id="autoSpeed" min="10" max="160" value="45" style="flex:1" />
    </div>
  </div>
  <div class="sep"></div>
  <button class="btn" id="lineBtn" style="justify-content:flex-start; width:100%; margin-bottom:8px">⬇ Arrow keys: word-by-word</button>
  <div class="ctl-h" style="margin:-2px 0 8px">Switch to line-by-line to jump a whole line per ↑/↓ press</div>
  <button class="btn" id="mirrorBtn" style="justify-content:flex-start; width:100%; margin-bottom:8px">⇄ Mirror text off</button>
  <button class="btn" id="capBtn" style="justify-content:flex-start; width:100%">🎙 Live caption on</button>
</div>

<div id="stage">
  <div id="fade"></div>
  <div id="band"></div>
  <div id="scroll"><div id="content"></div></div>
  <div id="caption"></div>
</div>

<div id="editor">
  <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:4px">
    <h2>Your script</h2>
    <span class="sub">Type or paste below, or drop a .txt / .md / .docx file.</span>
  </div>
  <div id="drop">
    <textarea id="draft" placeholder="Paste what you want to say…"></textarea>
    <div id="droplabel">⬆ Drop to load</div>
  </div>
  <input type="file" id="fileInput" accept=".txt,.md,.docx,text/plain" style="display:none" />
  <div style="display:flex; align-items:center; gap:10px">
    <button class="btn" id="chooseBtn" style="height:40px; padding:0 16px">⬆ Choose file</button>
    <button class="btn" id="clearBtn" style="height:40px; padding:0 14px; color:var(--sub)">Clear</button>
    <div class="spacer"></div>
    <span class="sub" id="wordCount" style="margin-right:4px">0 words</span>
    <button id="load">Load script</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- helpers ---------- */
  var SAMPLE =
"Thanks everyone for hopping on. I'll keep this tight.\n\n" +
"Today I want to walk through three things: where the pipeline stands, the one decision I need from this group, and what happens next week.\n\n" +
"First, the numbers are trending the right way and I'll show you exactly why. Second, I'd love your read on the timing. And third, I'll hand it back so we can talk through any concerns before we commit.";

  function normalize(w){ return w.toLowerCase().replace(/[^a-z0-9']/g,""); }
  function tokenize(s){ return s.split(/\s+/).map(normalize).filter(Boolean); }
  function wordsMatch(a,b){
    if(!a||!b) return false;
    if(a===b) return true;
    if(a.length>=4 && b.length>=4 && (a.indexOf(b)===0 || b.indexOf(a)===0)) return true;
    return false;
  }
  function align(base, spoken, items, look){
    var pos = base;
    for(var s=0;s<spoken.length;s++){
      var sw = spoken[s];
      var end = Math.min(items.length, pos+look);
      for(var j=pos;j<end;j++){
        if(wordsMatch(sw, items[j])){ pos=j+1; break; }
      }
    }
    return pos;
  }

  /* ---------- state ---------- */
  var script = SAMPLE, draft = SAMPLE, editing = true;
  var matchIndex = 0, base = 0, shouldListen = false, listening = false;
  var fontSize = 42, width = 72, look = 7, autoSpeed = 45, autoPlay = false;
  var mirror = false, showCaption = true, byLine = false;
  var items = [];          // normalized words
  var spans = [];          // span elements
  var lineStarts = [];     // word index at the start of each visual line
  var rec = null, supported = true, autoRaf = null, autoLast = null;

  /* ---------- elements ---------- */
  var $ = function(id){ return document.getElementById(id); };
  var content=$("content"), scroll=$("scroll"), band=$("band"), fade=$("fade"),
      caption=$("caption"), editor=$("editor"), bar=$("bar"), pop=$("pop"),
      voiceBtn=$("voiceBtn"), pct=$("pct");

  /* ---------- render script ---------- */
  function buildScript(){
    items = [];
    spans = [];
    var lines = script.replace(/\r/g,"").split(/\n/);
    var html = "", idx = 0;
    for(var l=0;l<lines.length;l++){
      html += "<p>";
      var ws = lines[l].split(/\s+/).filter(Boolean);
      for(var k=0;k<ws.length;k++){
        items.push(normalize(ws[k]));
        html += '<span class="w up" id="w'+idx+'">'+escapeHtml(ws[k])+' </span>';
        idx++;
      }
      html += "</p>";
    }
    content.innerHTML = html;
    for(var i=0;i<idx;i++){ spans.push($("w"+i)); }
    computeLineStarts();
    applyHighlight();
  }

  // Build line starts from how the text actually wraps on screen.
  // Words on the same visual row share an offsetTop; a jump means a new line.
  function computeLineStarts(){
    lineStarts = [];
    var lastTop = null;
    for(var i=0;i<spans.length;i++){
      var top = spans[i].offsetTop;
      if(lastTop===null || top > lastTop + 1){ lineStarts.push(i); lastTop = top; }
    }
  }
  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function currentLineRange(){
    var start = 0, end = items.length;
    for(var i=0;i<lineStarts.length;i++){
      if(lineStarts[i] <= matchIndex){ start = lineStarts[i]; end = (i+1<lineStarts.length) ? lineStarts[i+1] : items.length; }
      else break;
    }
    return [start, end];
  }
  function applyHighlight(){
    if(byLine){
      var r = currentLineRange();
      for(var i=0;i<spans.length;i++){
        var cls = i < r[0] ? "w spoken" : (i < r[1] ? "w current" : "w up");
        if(spans[i].className !== cls) spans[i].className = cls;
      }
    } else {
      for(var j=0;j<spans.length;j++){
        var c = j<matchIndex ? "w spoken" : (j===matchIndex ? "w current" : "w up");
        if(spans[j].className !== c) spans[j].className = c;
      }
    }
    pct.textContent = (items.length ? Math.round(matchIndex/items.length*100) : 0) + "%";
  }

  function setPointer(n){
    var clamped = Math.max(0, Math.min(items.length, n));
    if(clamped === matchIndex){ return; }
    matchIndex = clamped;
    applyHighlight();
    scrollToCurrent();
  }

  function nextLineIndex(){
    for(var i=0;i<lineStarts.length;i++){ if(lineStarts[i]>matchIndex) return lineStarts[i]; }
    return items.length;
  }
  function prevLineIndex(){
    var target = 0;
    for(var i=0;i<lineStarts.length;i++){
      if(lineStarts[i] < matchIndex) target = lineStarts[i]; else break;
    }
    return target;
  }
  function jump(n){ matchIndex = Math.max(0, Math.min(items.length, n)); base = matchIndex; applyHighlight(); scrollToCurrent(); }

  function scrollToCurrent(){
    var el = spans[matchIndex];
    if(!el) return;
    var bandPx = scroll.clientHeight*0.15;
    scroll.scrollTo({ top: Math.max(0, el.offsetTop - bandPx), behavior:"smooth" });
  }

  /* ---------- speech recognition ---------- */
  function initRec(){
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ supported = false; return; }
    rec = new SR();
    rec.continuous = true; rec.interimResults = true; rec.lang = "en-US"; rec.maxAlternatives = 1;
    rec.onresult = function(e){
      for(var i=e.resultIndex;i<e.results.length;i++){
        var r = e.results[i];
        var toks = tokenize(r[0].transcript);
        var np = align(base, toks, items, look);
        if(r.isFinal){
          base = np; setPointer(np); setCaption("");
        } else {
          setPointer(np);
          setCaption(r[0].transcript.trim().split(/\s+/).slice(-9).join(" "));
        }
      }
    };
    rec.onerror = function(e){
      if(e.error==="not-allowed" || e.error==="service-not-allowed"){
        shouldListen=false; setListening(false);
        showNotice("Microphone access was blocked. Click the 🔒/camera icon in Chrome's address bar, allow the mic, and reload. Auto-scroll works without it (⚙ → Play).");
      }
    };
    rec.onend = function(){
      if(shouldListen){ setTimeout(function(){ try{ rec.start(); }catch(_){} }, 200); }
    };
  }

  function setListening(on){
    listening = on;
    voiceBtn.className = "btn" + (on ? " live" : "");
    voiceBtn.innerHTML = on ? "🎙️ Listening" : "🎙️ Start voice";
    if(on) voiceBtn.classList.add("pulse"); else voiceBtn.classList.remove("pulse");
    if(!on) caption.style.display = "none";
  }
  function startListening(){
    if(!supported){ showNotice("Voice tracking needs Chrome or Edge. Use Auto-scroll instead (⚙ → Play)."); return; }
    setAuto(false);
    hideNotice();
    base = matchIndex; shouldListen = true; setListening(true);
    try{ rec.start(); }catch(_){}
  }
  function stopListening(){
    shouldListen = false; setListening(false);
    try{ rec.stop(); }catch(_){}
  }

  function setCaption(text){
    if(showCaption && listening && text){
      caption.textContent = text; caption.style.display = "block";
    } else {
      caption.style.display = "none";
    }
  }

  /* ---------- auto-scroll ---------- */
  function setAuto(on){
    autoPlay = on;
    $("autoBtn").textContent = on ? "⏸ Pause" : "▶ Play";
    $("autoBtn").className = "btn" + (on ? " live" : "");
    if(on){
      stopListening();
      autoLast = null;
      cancelAnimationFrame(autoRaf);
      var step = function(t){
        if(autoLast==null) autoLast=t;
        var dt=(t-autoLast)/1000; autoLast=t;
        scroll.scrollTop += autoSpeed*dt;
        autoRaf = requestAnimationFrame(step);
      };
      autoRaf = requestAnimationFrame(step);
    } else {
      cancelAnimationFrame(autoRaf);
    }
  }

  /* ---------- notices ---------- */
  function showNotice(t){ $("noticeText").textContent=t; $("notice").style.display="flex"; }
  function hideNotice(){ $("notice").style.display="none"; }

  /* ---------- editor ---------- */
  function openEditor(){ draft = script; $("draft").value = draft; updateCount(); editor.style.display="flex"; editing=true; }
  function updateCount(){ $("wordCount").textContent = tokenize($("draft").value).length + " words"; $("load").disabled = !$("draft").value.trim(); }
  function loadScript(){
    script = $("draft").value;
    matchIndex = 0; base = 0; scroll.scrollTop = 0;
    buildScript();
    editor.style.display="none"; editing=false; hideNotice();
    voiceBtn.style.display = "inline-flex";
    showStageDecor(true);
    saveState();
  }
  function showStageDecor(on){
    band.style.display = on ? "block" : "none";
    fade.style.display = on ? "block" : "none";
  }

  async function handleFiles(fileList){
    var file = fileList && fileList[0];
    if(!file) return;
    var name = file.name.toLowerCase();
    try{
      if(name.endsWith(".docx")){
        if(typeof mammoth === "undefined"){
          showNotice("Couldn't load the .docx reader (no internet?). Open the .docx, copy the text, and paste it here.");
          openEditor(); return;
        }
        var ab = await file.arrayBuffer();
        var res = await mammoth.extractRawText({ arrayBuffer: ab });
        $("draft").value = (res.value||"").trim();
      } else if(name.endsWith(".txt") || name.endsWith(".md") || (file.type||"").indexOf("text")===0){
        $("draft").value = (await file.text()).trim();
      } else {
        showNotice("Drop a .txt, .md, or .docx file (or just paste the text).");
      }
      updateCount();
    }catch(_){
      showNotice("Couldn't read that file. Try a .txt or paste the text instead.");
    }
  }

  /* ---------- wire up ---------- */
  $("scriptBtn").onclick = openEditor;
  voiceBtn.onclick = function(){ listening ? stopListening() : startListening(); };
  $("fontMinus").onclick = function(){ fontSize=Math.max(22,fontSize-3); content.style.fontSize=fontSize+"px"; computeLineStarts(); scrollToCurrent(); saveState(); };
  $("fontPlus").onclick = function(){ fontSize=Math.min(96,fontSize+3); content.style.fontSize=fontSize+"px"; computeLineStarts(); scrollToCurrent(); saveState(); };
  $("resetBtn").onclick = function(){ matchIndex=0; base=0; scroll.scrollTop=0; applyHighlight(); };
  $("themeBtn").onclick = function(){
    var light = document.body.classList.toggle("light");
    this.innerHTML = light ? "☀️" : "🌙";
    this.title = light ? "Switch to dark" : "Switch to light";
    saveState();
  };
  $("gearBtn").onclick = function(){ pop.style.display = pop.style.display==="block" ? "none" : "block"; };

  function fsActive(){ return document.fullscreenElement || document.webkitFullscreenElement; }
  $("fsBtn").onclick = function(){
    if(fsActive()){
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      var el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    }
  };
  function syncFsBtn(){ var on=fsActive(); $("fsBtn").innerHTML = on?"⛗":"⛶"; $("fsBtn").title = on?"Exit full screen":"Full screen"; }
  document.addEventListener("fullscreenchange", function(){ syncFsBtn(); if(spans.length) computeLineStarts(); });
  document.addEventListener("webkitfullscreenchange", function(){ syncFsBtn(); if(spans.length) computeLineStarts(); });

  $("hideBtn").onclick = function(){ bar.style.display="none"; $("showbar").style.display="inline-flex"; pop.style.display="none"; };
  $("showbar").onclick = function(){ bar.style.display="flex"; $("showbar").style.display="none"; };
  $("noticeX").onclick = hideNotice;

  $("width").oninput = function(e){ width=+e.target.value; $("widthLbl").textContent="Column width — "+width+"%"; content.style.maxWidth=width+"%"; computeLineStarts(); saveState(); };
  $("sense").oninput = function(e){ look=+e.target.value; $("senseLbl").textContent="Match sensitivity — "+look; saveState(); };
  $("autoSpeed").oninput = function(e){ autoSpeed=+e.target.value; saveState(); };
  $("autoBtn").onclick = function(){ setAuto(!autoPlay); };
  $("lineBtn").onclick = function(){ byLine=!byLine; this.textContent = byLine?"⬇ Arrow keys: line-by-line":"⬇ Arrow keys: word-by-word"; applyHighlight(); saveState(); };
  $("mirrorBtn").onclick = function(){ mirror=!mirror; scroll.style.transform = mirror?"scaleX(-1)":"none"; this.textContent = mirror?"⇄ Mirror text on":"⇄ Mirror text off"; saveState(); };
  $("capBtn").onclick = function(){ showCaption=!showCaption; this.textContent = showCaption?"🎙 Live caption on":"🎙 Live caption off"; if(!showCaption) caption.style.display="none"; saveState(); };

  content.onclick = function(e){
    var t = e.target;
    if(t && t.id && t.id.indexOf("w")===0){
      var i = parseInt(t.id.slice(1),10);
      if(!isNaN(i)){ matchIndex=i; base=i; applyHighlight(); scrollToCurrent(); }
    }
  };

  // editor controls
  $("draft").oninput = updateCount;
  $("clearBtn").onclick = function(){ $("draft").value=""; updateCount(); };
  $("chooseBtn").onclick = function(){ $("fileInput").click(); };
  $("fileInput").onchange = function(e){ handleFiles(e.target.files); };
  $("load").onclick = loadScript;

  var drop = $("drop");
  drop.addEventListener("dragover", function(e){ e.preventDefault(); drop.classList.add("drag"); });
  drop.addEventListener("dragleave", function(){ drop.classList.remove("drag"); });
  drop.addEventListener("drop", function(e){ e.preventDefault(); drop.classList.remove("drag"); handleFiles(e.dataTransfer.files); });

  // recompute visual lines when the window size changes the wrapping
  window.addEventListener("resize", function(){ if(spans.length) computeLineStarts(); });

  // keyboard shortcuts
  window.addEventListener("keydown", function(e){
    if(editing) return;
    var tag = (e.target.tagName||"").toLowerCase();
    if(tag==="textarea"||tag==="input") return;
    if(e.code==="Space"){ e.preventDefault(); listening?stopListening():startListening(); }
    else if(e.key==="ArrowDown"){ e.preventDefault(); jump(byLine ? nextLineIndex() : matchIndex+1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); jump(byLine ? prevLineIndex() : matchIndex-1); }
    else if(e.key==="f"||e.key==="F"){ e.preventDefault(); $("fsBtn").onclick(); }
  });

  /* ---------- persistence ---------- */
  var STORE = "teleprompter.v1";
  function saveState(){
    try{
      localStorage.setItem(STORE, JSON.stringify({
        script: script, fontSize: fontSize, width: width, look: look,
        autoSpeed: autoSpeed, mirror: mirror, showCaption: showCaption,
        byLine: byLine, light: document.body.classList.contains("light")
      }));
    }catch(_){}
  }
  function loadState(){
    var s;
    try{ s = JSON.parse(localStorage.getItem(STORE) || "null"); }catch(_){ s = null; }
    if(!s) return false;
    if(typeof s.script === "string" && s.script.trim()){ script = s.script; draft = s.script; }
    if(s.fontSize) fontSize = s.fontSize;
    if(s.width) width = s.width;
    if(s.look) look = s.look;
    if(s.autoSpeed) autoSpeed = s.autoSpeed;
    mirror = !!s.mirror;
    showCaption = s.showCaption !== false;
    byLine = !!s.byLine;
    if(s.light) document.body.classList.add("light");
    return typeof s.script === "string" && !!s.script.trim();
  }
  function applySettingsUI(){
    content.style.fontSize = fontSize + "px";
    content.style.maxWidth = width + "%";
    $("width").value = width; $("widthLbl").textContent = "Column width — " + width + "%";
    $("sense").value = look; $("senseLbl").textContent = "Match sensitivity — " + look;
    $("autoSpeed").value = autoSpeed;
    scroll.style.transform = mirror ? "scaleX(-1)" : "none";
    $("mirrorBtn").textContent = mirror ? "⇄ Mirror text on" : "⇄ Mirror text off";
    $("capBtn").textContent = showCaption ? "🎙 Live caption on" : "🎙 Live caption off";
    $("lineBtn").textContent = byLine ? "⬇ Arrow keys: line-by-line" : "⬇ Arrow keys: word-by-word";
    var light = document.body.classList.contains("light");
    $("themeBtn").innerHTML = light ? "☀️" : "🌙";
    $("themeBtn").title = light ? "Switch to dark" : "Switch to light";
  }

  /* ---------- init ---------- */
  initRec();
  var hadScript = loadState();
  applySettingsUI();
  $("draft").value = draft;
  updateCount();
  buildScript();
  if(hadScript){
    editor.style.display = "none"; editing = false;
    voiceBtn.style.display = "inline-flex";
    showStageDecor(true);
  } else {
    showStageDecor(false);
  }
})();
</script>
</body>
</html>
